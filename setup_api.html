<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统初始化配置 - 数律智检</title>
    <style>
        :root {
            --primary: #399DF5;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            background: var(--card);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            width: 450px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        h1 { font-size: 24px; margin-bottom: 8px; color: var(--primary); }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 30px; }
        .input-group { text-align: left; margin-bottom: 24px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #cbd5e1; }
        input {
            width: 100%;
            padding: 12px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus { border-color: var(--primary); }
        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }
        button:hover { background: #2563eb; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        .msg { font-size: 13px; margin-top: 15px; min-height: 20px; }
        .error { color: #ef4444; }
        .success { color: #22c55e; }
    </style>
</head>
<body>
    <div class="container">
        <h1>系统初始化</h1>
        <p>欢迎使用数律智检，请先配置 AI 推理密钥</p>
        
        <div class="input-group">
            <label for="apiKey">DeepSeek API Key</label>
            <input type="password" id="apiKey" placeholder="在此输入以 sk- 开头的密钥">
        </div>
        
        <button onclick="saveKey()">保存并启动系统</button>
        <div id="msg" class="msg"></div>
    </div>

    <script>
        async function saveKey() {
            const key = document.getElementById('apiKey').value.trim();
            const msgEl = document.getElementById('msg');
            
            if (!key) {
                showMsg('请输入 API 密钥', 'error');
                return;
            }

            try {
                // 调用 Python 注入的 API
                const res = await window.pywebview.api.save_api_key(key);
                if (res.status === 'success') {
                    showMsg('保存成功，正在进入系统...', 'success');
                } else {
                    showMsg(res.message, 'error');
                }
            } catch (e) {
                showMsg('保存失败：请确保按照说明运行', 'error');
            }
        }

        function showMsg(text, type) {
            const msgEl = document.getElementById('msg');
            msgEl.innerText = text;
            msgEl.className = 'msg ' + type;
        }
    </script>
</body>
</html>
