<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在启动 - 数律智检</title>
    <style>
        :root {
            --bg: #0f172a;
            --accent: #3b82f6;
            --text: #f8fafc;
        }
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        .container {
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            font-size: 48px;
            margin-bottom: 24px;
        }
        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .status {
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 0.05em;
        }
        .tip {
            margin-top: 12px;
            font-size: 13px;
            color: #94a3b8;
        }
        .progress-bar {
            width: 200px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin: 20px auto;
            position: relative;
            overflow: hidden;
        }
        .progress-fill {
            position: absolute;
            height: 100%;
            width: 30%;
            background: var(--accent);
            border-radius: 2px;
            animation: moveProgress 2s ease-in-out infinite;
        }
        @keyframes moveProgress {
            0% { left: -30%; }
            100% { left: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">⚖️</div>
        <div class="loader"></div>
        <div class="status" id="statusText">系统正在启动</div>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <div class="tip">首次运行需初始化法律知识库，大约需要 30-60 秒</div>
    </div>
    <script>
        // 每隔几秒切换一下提示语，让用户觉得有进度
        const tips = [
            "正在加载民法典索引...",
            "正在初始化研判引擎...",
            "正在建立安全连接...",
            "系统正在进行自检..."
        ];
        let idx = 0;
        setInterval(() => {
            document.getElementById('statusText').innerText = tips[idx % tips.length];
            idx++;
        }, 3000);
    </script>
</body>
</html>
