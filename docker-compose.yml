version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./backend/vector_store:/app/backend/vector_store
      - ./backend/data:/app/backend/data
    networks:
      - shulv-network
    restart: always

  frontend:
    build:
      context: ./admin_frontend
      dockerfile: Dockerfile
    networks:
      - shulv-network
    restart: always

  nginx:
    image: nginx:stable-alpine
    container_name: shulv-nginx
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    networks:
      - shulv-network
    restart: always

networks:
  shulv-network:
    driver: bridge
