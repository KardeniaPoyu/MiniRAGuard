name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend (lint/test)
    runs-on: ubuntu-latest
    if: ${{ hashFiles('rent_agent_backend/requirements.txt') != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r rent_agent_backend/requirements.txt
          pip install ruff pytest

      - name: Ruff (basic)
        run: |
          ruff check rent_agent_backend

      - name: Pytest (if tests exist)
        if: ${{ hashFiles('rent_agent_backend/test_*.py', 'rent_agent_backend/**/test_*.py') != '' }}
        run: |
          pytest -q

